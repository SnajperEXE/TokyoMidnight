name: Discord Notification

on: [push]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Custom Webhook to Discord
        uses: actions-ecosystem/action-discord-webhook@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          username: "${{ github.actor }}"
          avatar_url: "https://githubusercontent.com"
          embeds: |
            [
              {
                "title": "[${{ github.repository }}] New commit pushed",
                "color": 3066993,
                "description": "Changes committed directly via GitHub web interface by ${{ github.actor }}."
              }
            ]
