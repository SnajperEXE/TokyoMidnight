name: Discord Push Notification

on: [push] # Spustí sa pri každom pushnutí kódu

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Custom Webhook to Discord
        uses: actions-ecosystem/action-discord-webhook@v1
        with:
          # Použije rovnaké tajomstvo z nastavení, aké tam máš teraz
          webhook: ${{ secrets.WEBHOOK_URL }} 
          username: "SnajperEXE"
            avatar_url: "https://githubusercontent.com{{ github.run_id }}"
          embeds: |
            [
              {
                "title": "[${{ github.repository }}] New commit pushed",
                "color": 2105893,
                "description": "Changes committed directly via GitHub web interface by SnajperEXE."
              }
            ]
