name: Discord Push Notification

on: [push]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Direct Native Embed to Discord
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          
          curl -H "Content-Type: application/json" \
               -X POST \
               -d "{
                 \"username\": \"SnajperEXE\",
                 \"avatar_url\": \"https://githubusercontent.com\",
                 \"embeds\": [
                   {
                     \"author\": {
                       \"name\": \"SnajperEXE\",
                       \"icon_url\": \"https://githubusercontent.com\"
                     },
                     \"title\": \"[${{ github.event.repository.name }}:${{ github.ref_name }}] 1 new commit\",
                     \"color\": 23296,
                     \"description\": \"\`$SHORT_SHA\` ${{ github.event.head_commit.message }} - SnajperEXE\"
                   }
                 ]
               }" \
               ${{ secrets.WEBHOOK_URL }}
