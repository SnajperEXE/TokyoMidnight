name: Discord Push Notification

on: [push]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Clean Native Embed to Discord
        uses: actions-ecosystem/action-discord-webhook@v1
        with:
          webhook: ${{ secrets.WEBHOOK_URL }}
          username: "SnajperEXE"
          avatar_url: "https://githubusercontent.com"
          embeds: |
            [
              {
                "author": {
                  "name": "SnajperEXE",
                  "icon_url": "https://githubusercontent.com"
                },
                "title": "[${{ github.event.repository.name }}:${{ github.ref_name }}] 1 new commit",
                "color": 23296,
                "description": "`${{ github.sha }}` ${{ github.event.head_commit.message }} - SnajperEXE"
              }
            ]
