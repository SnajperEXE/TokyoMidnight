name: Discord Push Notification

on: [push]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Split Native Embed to Discord
        run: |
          export SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{
                 "username": "${{ github.actor }}",
                 "avatar_url": "[github.com](https://github.com/${{) github.actor }}.png",
                 "embeds": [
                   {
                     "author": {
                       "name": "${{ github.actor }}",
                       "icon_url": "[github.com](https://github.com/${{) github.actor }}.png"
                     },
                     "description": "**[${{ github.event.repository.name }}:${{ github.ref_name }}] 1 new commit**\n\n`'"$SHORT_SHA"'` ${{ github.event.head_commit.message }} - ${{ github.actor }}"
                   }
                 ]
               }' \
               ${{ secrets.WEBHOOK_URL }}
