name: Discord Push Notification

on: [push]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord Message
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.WEBHOOK_URL }}
          SLACK_USERNAME: "SnajperEXE"
          SLACK_AVATAR: "https://githubusercontent.com"
          SLACK_COLOR: "#2e7d32"
          SLACK_TITLE: "Nový kód bol nahraný!"
          SLACK_MESSAGE: "Commit: ${{ github.event.head_commit.message }}\nAutor: ${{ github.actor }}"
